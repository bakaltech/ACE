<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get a bespoke property management quote from Ace Properties.">
    <title>Contact · Ace Properties</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="index.html">Ace<span class="dot">.</span>Properties</a></div><button
                class="menu-toggle" id="menuToggle" aria-label="Menu" aria-expanded="false"><i class="fas fa-bars"></i></button>
            <div class="nav-links" id="navLinks"><a href="index.html">Home</a><a
                    href="residential.html">Residential</a><a href="commercial.html">Commercial</a><a
                    href="about.html">About</a><a href="contact.html" class="active">Contact</a><a href="contact.html"
                    class="owner-portal"><i class="far fa-user-circle"></i> Owner Portal</a><a href="contact.html"
                    class="btn-outline">Get a Quote</a></div>
        </div>
    </nav>

    <section class="contact-section">
        <div class="container contact-grid">
            <div class="fade-up">
                <div class="section-sub section-sub-light">Concierge Service</div>
                <h2 class="section-title-light">Request a Quote</h2>
                <div class="divider divider--light"></div>
                <form id="quoteForm" class="contact-form">
                    <label for="contactName">Full name *</label>
                    <input id="contactName" type="text" name="name" placeholder="Full name *" required>
                    <label for="contactEmail">Email address *</label>
                    <input id="contactEmail" type="email" name="email" placeholder="Email address *" required>
                    <label for="contactPhone">Phone number</label>
                    <input id="contactPhone" type="tel" name="phone" placeholder="Phone number">
                    <label for="contactType">Property type *</label>
                    <select id="contactType" name="propertyType" required>
                        <option value="">Property type *</option>
                        <option>Residential</option>
                        <option>Commercial</option>
                    </select>
                    <label for="contactMessage">Tell us about your property</label>
                    <textarea id="contactMessage" name="message" rows="3" placeholder="Tell us about your property"></textarea>
                    <button type="submit" class="btn-gold">Send Request <i class="fas fa-paper-plane"></i></button>
                    <p class="secure-note"><i class="fas fa-lock"></i> Your data is secure</p>
                </form>
            </div>
            <div class="map-container fade-up">
                <iframe title="Ace Properties"
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3022.966309534332!2d-74.004257684594!3d40.7406573793288!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c259bf14555b17%3A0x4e5e8e6b3c1a5c2!2sChelsea%2C%20New%20York%2C%20NY!5e0!3m2!1sen!2sus!4v1616000000000"
                    width="100%" height="100%" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container footer-grid">
            <div>
                <h4>Residential</h4><a href="residential.html">Tenant placement</a>
            </div>
            <div>
                <h4>Commercial</h4><a href="commercial.html">Lease negotiation</a>
            </div>
            <div>
                <h4>Company</h4><a href="about.html">About</a>
            </div>
            <div>
                <h4>Legal</h4><a href="#">Privacy</a>
            </div>
        </div>
    </footer>
    <a href="https://wa.me/?text=Hello%20Ace%20Properties" class="wa-float" id="whatsappBtn"><i class="fab fa-whatsapp"></i></a>

    <script src="js/main.js"></script>
</body>

</html>
